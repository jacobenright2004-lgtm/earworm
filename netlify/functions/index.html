<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EARWORM</title>
<link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#0a0a0a; --surface:#111; --surface2:#1a1a1a;
    --border:#2a2a2a; --accent:#e8ff3e; --accent2:#ff3e6c;
    --text:#f0f0f0; --muted:#666; --correct:#3effa3; --wrong:#ff3e6c;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--bg); color:var(--text); font-family:'Space Mono',monospace; min-height:100vh; overflow-x:hidden; }
  body::before {
    content:''; position:fixed; inset:0; pointer-events:none; z-index:9999;
    background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.06) 2px,rgba(0,0,0,.06) 4px);
  }
  .container { max-width:680px; margin:0 auto; padding:40px 20px 80px; }
  .header { text-align:center; margin-bottom:48px; }
  .logo {
    font-family:'Black Han Sans',sans-serif; font-size:clamp(60px,14vw,100px);
    letter-spacing:-2px; line-height:1; color:var(--accent);
    text-shadow:4px 4px 0 var(--accent2),8px 8px 0 rgba(232,255,62,.15);
    animation:logoGlitch 9s infinite;
  }
  @keyframes logoGlitch {
    0%,89%,100%{text-shadow:4px 4px 0 var(--accent2),8px 8px 0 rgba(232,255,62,.15)}
    91%{text-shadow:-4px 3px 0 var(--accent2),8px -2px 0 rgba(232,255,62,.3);transform:skewX(-2deg)}
    93%{text-shadow:4px -4px 0 var(--accent2),-4px 8px 0 rgba(232,255,62,.15);transform:skewX(0)}
  }
  .tagline { color:var(--muted); font-size:10px; letter-spacing:4px; text-transform:uppercase; margin-top:8px; }
  .screen { display:none; }
  .screen.active { display:block; animation:fadeIn .3s ease; }
  @keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
  .card { background:var(--surface); border:1px solid var(--border); border-radius:2px; padding:28px; margin-bottom:16px; position:relative; }
  .card::before { content:''; position:absolute; top:0;left:0;right:0; height:2px; background:var(--accent); }
  .section-label { font-size:9px; letter-spacing:3px; text-transform:uppercase; color:var(--accent); margin-bottom:18px; }
  .input-group { margin-bottom:20px; }
  .input-group:last-child { margin-bottom:0; }
  label { display:block; font-size:10px; letter-spacing:2px; text-transform:uppercase; color:var(--muted); margin-bottom:8px; }
  input[type="text"] {
    width:100%; background:var(--bg); border:1px solid var(--border);
    color:var(--text); font-family:'Space Mono',monospace; font-size:15px;
    padding:13px 16px; outline:none; transition:border-color .2s; border-radius:1px;
  }
  input[type="text"]:focus { border-color:var(--accent); }
  .snippet-options { display:flex; gap:10px; }
  .snippet-btn {
    flex:1; background:var(--bg); border:1px solid var(--border); color:var(--muted);
    font-family:'Space Mono',monospace; font-size:13px; padding:12px 8px;
    cursor:pointer; transition:all .15s; text-align:center; border-radius:1px;
  }
  .snippet-btn:hover { border-color:var(--accent); color:var(--text); }
  .snippet-btn.selected { background:var(--accent); border-color:var(--accent); color:#000; font-weight:700; }
  .btn-primary {
    width:100%; background:var(--accent); border:none; color:#000;
    font-family:'Black Han Sans',sans-serif; font-size:20px; letter-spacing:2px;
    padding:18px; cursor:pointer; transition:all .15s; border-radius:1px; text-transform:uppercase;
  }
  .btn-primary:hover { background:#fff; box-shadow:0 8px 24px rgba(232,255,62,.25); transform:translateY(-1px); }
  .btn-primary:active { transform:translateY(0); }
  .btn-primary:disabled { opacity:.35; cursor:not-allowed; transform:none; box-shadow:none; }
  .btn-secondary {
    background:transparent; border:1px solid var(--border); color:var(--muted);
    font-family:'Space Mono',monospace; font-size:11px; padding:10px 20px;
    cursor:pointer; transition:all .15s; letter-spacing:1px; border-radius:1px;
  }
  .btn-secondary:hover { border-color:var(--accent); color:var(--text); }
  .error-msg {
    background:rgba(255,62,108,.08); border:1px solid rgba(255,62,108,.3);
    color:var(--wrong); padding:12px 16px; font-size:11px; line-height:1.7;
    margin-top:12px; border-radius:1px; display:none;
  }
  .info-notice {
    background:rgba(232,255,62,.04); border:1px solid rgba(232,255,62,.15);
    padding:14px 16px; font-size:10px; line-height:1.9; color:var(--muted); margin-bottom:16px; border-radius:1px;
  }
  .info-notice strong { color:var(--accent); }
  .progress-bar-wrap { display:flex; gap:5px; margin-bottom:28px; }
  .progress-pip { flex:1; height:4px; background:var(--border); border-radius:2px; transition:background .3s; }
  .progress-pip.done { background:var(--correct); }
  .progress-pip.wrong { background:var(--wrong); }
  .progress-pip.current { background:var(--accent); animation:pipPulse 1.2s ease-in-out infinite; }
  @keyframes pipPulse { 0%,100%{opacity:1}50%{opacity:.35} }
  .round-info { display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; }
  .round-num { font-family:'Black Han Sans',sans-serif; font-size:38px; color:var(--accent); line-height:1; }
  .round-num span { font-size:15px; color:var(--muted); font-family:'Space Mono',monospace; }
  .score-display { font-size:11px; color:var(--muted); letter-spacing:2px; text-align:right; }
  .score-display strong { color:var(--text); font-size:22px; display:block; }
  .play-area { text-align:center; margin:28px 0 28px; }
  .play-btn {
    width:96px; height:96px; border-radius:50%; background:var(--surface2);
    border:2px solid var(--accent); color:var(--accent); font-size:34px;
    cursor:pointer; transition:all .2s; display:inline-flex; align-items:center; justify-content:center;
  }
  .play-btn:hover:not(:disabled) { background:var(--accent); color:#000; box-shadow:0 0 40px rgba(232,255,62,.35); transform:scale(1.05); }
  .play-btn.playing { background:var(--accent); color:#000; animation:playPulse .5s ease-in-out infinite alternate; }
  @keyframes playPulse { from{box-shadow:0 0 20px rgba(232,255,62,.3)} to{box-shadow:0 0 55px rgba(232,255,62,.65)} }
  .play-btn:disabled { opacity:.25; cursor:not-allowed; transform:none !important; }
  .snippet-label { font-size:10px; letter-spacing:3px; color:var(--accent); text-transform:uppercase; margin-top:10px; }
  .choices { display:flex; flex-direction:column; gap:10px; margin-top:4px; }
  .choice-btn {
    width:100%; background:var(--surface2); border:1px solid var(--border);
    color:var(--text); font-family:'Space Mono',monospace; font-size:13px;
    padding:15px 18px; cursor:pointer; transition:all .15s; text-align:left;
    border-radius:1px; line-height:1.4; display:flex; align-items:center; gap:12px;
  }
  .choice-btn:hover:not(:disabled) { border-color:var(--accent); color:var(--accent); background:rgba(232,255,62,.05); }
  .choice-btn:disabled { cursor:not-allowed; }
  .choice-btn.correct { background:rgba(62,255,163,.12); border-color:var(--correct); color:var(--correct); }
  .choice-btn.wrong   { background:rgba(255,62,108,.12); border-color:var(--wrong); color:var(--wrong); }
  .choice-btn.reveal  { border-color:var(--correct); color:var(--correct); background:rgba(62,255,163,.06); }
  .choice-letter {
    display:inline-flex; align-items:center; justify-content:center;
    width:24px; height:24px; background:var(--border); border-radius:1px;
    font-size:10px; font-weight:700; flex-shrink:0; transition:background .15s;
  }
  .choice-btn.correct .choice-letter { background:var(--correct); color:#000; }
  .choice-btn.wrong   .choice-letter { background:var(--wrong); color:#000; }
  .choice-btn.reveal  .choice-letter { background:var(--correct); color:#000; }
  .next-btn {
    width:100%; margin-top:14px; background:var(--surface2); border:1px solid var(--border);
    color:var(--text); font-family:'Space Mono',monospace; font-size:12px; letter-spacing:2px;
    padding:14px; cursor:pointer; transition:all .15s; text-transform:uppercase; border-radius:1px;
  }
  .next-btn:hover { border-color:var(--accent); color:var(--accent); }
  .final-score { text-align:center; padding:36px 0 24px; }
  .final-num { font-family:'Black Han Sans',sans-serif; font-size:96px; line-height:1; color:var(--accent); text-shadow:4px 4px 0 var(--accent2); }
  .final-denom { font-size:20px; color:var(--muted); letter-spacing:4px; margin-bottom:12px; }
  .final-grade { font-family:'Black Han Sans',sans-serif; font-size:22px; letter-spacing:1px; margin-bottom:8px; }
  .results-list { text-align:left; margin:20px 0; }
  .result-item { display:flex; align-items:center; gap:12px; padding:11px 0; border-bottom:1px solid var(--border); font-size:11px; }
  .result-item:last-child { border-bottom:none; }
  .result-dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
  .result-dot.c { background:var(--correct); }
  .result-dot.w { background:var(--wrong); }
  .result-song { flex:1; color:var(--text); }
  .result-guess { color:var(--muted); font-style:italic; font-size:10px; }
  .play-again-wrap { display:flex; gap:10px; margin-top:20px; }
  .spinner {
    display:inline-block; width:13px; height:13px;
    border:2px solid rgba(0,0,0,.25); border-top-color:#000;
    border-radius:50%; animation:spin .7s linear infinite; vertical-align:middle; margin-right:6px;
  }
  @keyframes spin { to{transform:rotate(360deg)} }
  .loading-status { font-size:10px; color:var(--muted); letter-spacing:2px; text-align:center; margin-top:12px; min-height:16px; }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="logo">EARWORM</div>
    <div class="tagline">how well do you know your artist?</div>
  </div>

  <!-- SETUP -->
  <div class="screen active" id="screen-setup">
    <div class="info-notice">
      <strong>No login needed.</strong> Randomly pulls from the full discography via Deezer.
    </div>
    <div class="card">
      <div class="section-label">// Game Setup</div>
      <div class="input-group">
        <label>Artist Name</label>
        <input type="text" id="artist-input" placeholder="e.g. Eminem"
          autocomplete="off" onkeydown="if(event.key==='Enter') startGame()">
      </div>
      <div class="input-group">
        <label>Snippet Length</label>
        <div class="snippet-options">
          <button class="snippet-btn" data-val="0.25">0.25s</button>
          <button class="snippet-btn selected" data-val="0.5">0.5s</button>
          <button class="snippet-btn" data-val="1">1s</button>
        </div>
      </div>
    </div>
    <div id="setup-error" class="error-msg"></div>
    <button class="btn-primary" id="start-btn" onclick="startGame()">START GAME</button>
    <div class="loading-status" id="loading-status"></div>
  </div>

  <!-- GAME -->
  <div class="screen" id="screen-game">
    <div class="progress-bar-wrap" id="progress-bar"></div>
    <div class="round-info">
      <div class="round-num" id="round-num">1 <span>/ 10</span></div>
      <div class="score-display">Score<strong id="score-val">0</strong></div>
    </div>
    <div class="card">
      <div class="play-area">
        <button class="play-btn" id="play-btn" onclick="playSnippet()">▶</button>
        <div class="snippet-label" id="snippet-label">0.5s snippet</div>
      </div>
      <div class="choices" id="choices"></div>
      <button class="next-btn" id="next-btn" style="display:none;" onclick="nextRound()">NEXT SONG →</button>
    </div>
  </div>

  <!-- FINAL -->
  <div class="screen" id="screen-final">
    <div class="card">
      <div class="final-score">
        <div class="final-num" id="final-score-num">0</div>
        <div class="final-denom" id="final-denom">OUT OF 10</div>
        <div class="final-grade" id="final-grade"></div>
      </div>
      <div class="results-list" id="results-list"></div>
      <div class="play-again-wrap">
        <button class="btn-primary" style="flex:2;" onclick="playAgainSameArtist()">SAME ARTIST</button>
        <button class="btn-secondary" style="flex:1;" onclick="goHome()">NEW ARTIST</button>
      </div>
    </div>
  </div>
</div>

<audio id="preview-audio" preload="none"></audio>

<script>
let snippetDuration = 0.5;
let gameTracks = [];
let trackPool = [];
let currentRound = 0;
let score = 0;
let results = [];
let isRevealed = false;
let stopTimer = null;
let snippetSeekTime = 0;

const audio = document.getElementById('preview-audio');

// Call our own Netlify function — no CORS, no proxy
async function deezerGet(path) {
  const res = await fetch('/.netlify/functions/deezer?path=' + encodeURIComponent(path));
  if (!res.ok) throw new Error('API error ' + res.status);
  const data = await res.json();
  if (data && data.error) throw new Error(data.error.message || 'Deezer error');
  return data;
}

document.querySelectorAll('.snippet-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.snippet-btn').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
    snippetDuration = parseFloat(btn.dataset.val);
  });
});

function show(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}
function showError(id, msg) { const e = document.getElementById(id); e.innerHTML = msg; e.style.display = 'block'; }
function hideError(id) { document.getElementById(id).style.display = 'none'; }
function setStatus(msg) { const el = document.getElementById('loading-status'); if(el) el.textContent = msg; }
function shuffle(a) { return a.sort(() => Math.random() - 0.5); }
function norm(s) {
  return String(s).toLowerCase().replace(/[\(\[\{].*?[\)\]\}]/g,'').replace(/[^a-z0-9\s]/g,'').replace(/\s+/g,' ').trim();
}

async function fetchArtistTracks(artistName) {
  setStatus('SEARCHING ARTIST…');
  const search = await deezerGet('/search/artist?q=' + encodeURIComponent(artistName) + '&limit=1');
  if (!search.data || !search.data.length) throw new Error('Artist "' + artistName + '" not found.');
  const artist = search.data[0];

  setStatus('LOADING DISCOGRAPHY…');

  // Get all albums
  let albums = [];
  let nextPath = '/artist/' + artist.id + '/albums?limit=50';
  while (nextPath && albums.length < 200) {
    const page = await deezerGet(nextPath);
    albums = albums.concat(page.data || []);
    nextPath = page.next ? page.next.replace('https://api.deezer.com','') : null;
  }

  if (!albums.length) throw new Error('No albums found for "' + artist.name + '".');

  // Shuffle albums so we get tracks from all eras
  shuffle(albums);

  // Pull tracks until we have 80+ with previews
  const seen = new Set();
  let allTracks = [];

  for (const album of albums) {
    if (allTracks.length >= 80) break;
    setStatus('FETCHING TRACKS… (' + allTracks.length + ' found)');
    try {
      const ab = await deezerGet('/album/' + album.id + '/tracks?limit=50');
      for (const t of (ab.data || [])) {
        if (!t.preview) continue;
        const key = norm(t.title);
        if (seen.has(key)) continue;
        seen.add(key);
        allTracks.push(t);
      }
    } catch(e) { /* skip bad album */ }
  }

  if (allTracks.length < 10) throw new Error('Not enough previewable tracks for "' + artist.name + '".');

  setStatus('');
  return shuffle(allTracks);
}

async function startGame() {
  hideError('setup-error');
  setStatus('');
  const name = document.getElementById('artist-input').value.trim();
  if (!name) return showError('setup-error', 'Please enter an artist name.');

  const btn = document.getElementById('start-btn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>LOADING…';

  try {
    const all = await fetchArtistTracks(name);
    trackPool = all;
    gameTracks = all.slice(0, 10);
    currentRound = 0; score = 0; results = [];
    buildProgressBar();
    show('screen-game');
    loadRound();
  } catch(err) {
    showError('setup-error', err.message || 'Something went wrong. Try again.');
    setStatus('');
  } finally {
    btn.disabled = false;
    btn.innerHTML = 'START GAME';
  }
}

function buildProgressBar() {
  const bar = document.getElementById('progress-bar');
  bar.innerHTML = '';
  gameTracks.forEach((_, i) => {
    const p = document.createElement('div');
    p.className = 'progress-pip' + (i === 0 ? ' current' : '');
    p.id = 'pip-' + i;
    bar.appendChild(p);
  });
}

function updatePip(i, correct) {
  const pip = document.getElementById('pip-' + i);
  pip.classList.remove('current');
  pip.classList.add(correct ? 'done' : 'wrong');
  const next = document.getElementById('pip-' + (i + 1));
  if (next) next.classList.add('current');
}

function loadRound() {
  isRevealed = false;
  clearTimeout(stopTimer);
  audio.pause();

  snippetSeekTime = 30 * (0.20 + Math.random() * 0.40);

  document.getElementById('round-num').innerHTML = (currentRound + 1) + ' <span>/ ' + gameTracks.length + '</span>';
  document.getElementById('score-val').textContent = score;
  document.getElementById('snippet-label').textContent = snippetDuration + 's snippet';
  document.getElementById('next-btn').style.display = 'none';

  const pb = document.getElementById('play-btn');
  pb.className = 'play-btn';
  pb.textContent = '▶';
  pb.disabled = false;

  buildChoices();

  audio.src = gameTracks[currentRound].preview;
  audio.load();
}

function buildChoices() {
  const correctTrack = gameTracks[currentRound];
  const correctTitle = correctTrack.title;
  const gameTrackKeys = new Set(gameTracks.map(t => norm(t.title)));

  const wrongPool = trackPool.filter(t => {
    const n = norm(t.title);
    return n !== norm(correctTitle) && !gameTrackKeys.has(n);
  });
  shuffle(wrongPool);
  const wrongs = wrongPool.slice(0, 3).map(t => t.title);
  while (wrongs.length < 3) wrongs.push('Track ' + (wrongs.length + 1));

  const options = shuffle([correctTitle, ...wrongs]);
  const letters = ['A','B','C','D'];

  document.getElementById('choices').innerHTML = options.map((title, i) =>
    '<button class="choice-btn" id="choice-' + i + '" onclick="selectChoice(' + i + ')">' +
      '<span class="choice-letter">' + letters[i] + '</span>' +
      '<span>' + escHtml(title) + '</span>' +
    '</button>'
  ).join('');

  window._options = options;
  window._correctTitle = correctTitle;
}

function playSnippet() {
  clearTimeout(stopTimer);
  audio.pause();
  audio.currentTime = snippetSeekTime;

  const btn = document.getElementById('play-btn');
  btn.className = 'play-btn playing';
  btn.textContent = '■';

  audio.play().catch(e => console.warn('Playback:', e));

  stopTimer = setTimeout(() => {
    audio.pause();
    btn.className = 'play-btn';
    btn.textContent = '▶';
  }, snippetDuration * 1000);
}

function selectChoice(index) {
  if (isRevealed) return;
  isRevealed = true;
  clearTimeout(stopTimer);
  audio.pause();

  const chosen = window._options[index];
  const correct = window._correctTitle;
  const isCorrect = norm(chosen) === norm(correct);

  if (isCorrect) score++;
  results.push({ track: correct, guess: chosen, correct: isCorrect });
  updatePip(currentRound, isCorrect);
  document.getElementById('score-val').textContent = score;

  document.querySelectorAll('.choice-btn').forEach((btn, i) => {
    btn.disabled = true;
    const title = window._options[i];
    if (norm(title) === norm(correct)) {
      btn.classList.add(i === index ? 'correct' : 'reveal');
    } else if (i === index) {
      btn.classList.add('wrong');
    }
  });

  const pb = document.getElementById('play-btn');
  pb.className = 'play-btn';
  pb.textContent = '▶';

  const nb = document.getElementById('next-btn');
  nb.style.display = 'block';
  nb.textContent = currentRound + 1 < gameTracks.length ? 'NEXT SONG →' : 'SEE RESULTS →';
}

function nextRound() {
  currentRound++;
  if (currentRound >= gameTracks.length) showFinal();
  else loadRound();
}

function showFinal() {
  show('screen-final');
  const total = gameTracks.length;
  document.getElementById('final-score-num').textContent = score;
  document.getElementById('final-denom').textContent = 'OUT OF ' + total;
  const pct = score / total;
  document.getElementById('final-grade').textContent =
    pct === 1   ? '🏆 PERFECT. YOU ARE THE FAN.' :
    pct >= 0.8  ? '🔥 HUGE FAN ENERGY' :
    pct >= 0.6  ? '😎 SOLID KNOWLEDGE' :
    pct >= 0.4  ? '🎧 CASUAL LISTENER' :
    pct >= 0.2  ? '🤔 JUST GETTING STARTED' :
                  '💀 DO YOU EVEN LISTEN?';
  document.getElementById('results-list').innerHTML = results.map(r =>
    '<div class="result-item">' +
      '<div class="result-dot ' + (r.correct ? 'c' : 'w') + '"></div>' +
      '<div class="result-song">' + escHtml(r.track) + '</div>' +
      (!r.correct ? '<div class="result-guess">' + escHtml(r.guess) + '</div>' : '') +
    '</div>'
  ).join('');
}

function playAgainSameArtist() {
  shuffle(trackPool);
  gameTracks = trackPool.slice(0, 10);
  currentRound = 0; score = 0; results = [];
  buildProgressBar(); show('screen-game'); loadRound();
}

function goHome() { show('screen-setup'); }

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
</script>
</body>
</html>
